services:
  - type: web
    name: classroom-backend
    env: node
    # Keep service root at repo root; commands target backend/ explicitly so
    # builds succeed even if rootDir is ignored by Render.
    buildCommand: npm install --prefix backend && npm run build --prefix backend
    startCommand: node backend/dist/server.js
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: ARCJET_KEY
        sync: false
